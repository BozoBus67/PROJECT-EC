<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#3a1f5d"/>
      <stop offset="55%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#08040f"/>
    </radialGradient>
    <linearGradient id="gemBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cc1ff"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="gemPink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb3d9"/>
      <stop offset="1" stop-color="#7a1145"/>
    </linearGradient>
    <linearGradient id="gemGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a4f5b8"/>
      <stop offset="1" stop-color="#0f5132"/>
    </linearGradient>
    <linearGradient id="gemYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe88a"/>
      <stop offset="1" stop-color="#a06a00"/>
    </linearGradient>
    <linearGradient id="gemPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8b4fe"/>
      <stop offset="1" stop-color="#4a1d8a"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <g opacity="0.85">
    <circle cx="150"  cy="120" r="1.5" fill="#fff"/>
    <circle cx="380"  cy="60"  r="1"   fill="#fff"/>
    <circle cx="520"  cy="180" r="1.2" fill="#fff"/>
    <circle cx="780"  cy="90"  r="1"   fill="#fff"/>
    <circle cx="980"  cy="40"  r="1.5" fill="#fff"/>
    <circle cx="1220" cy="160" r="1"   fill="#fff"/>
    <circle cx="1420" cy="80"  r="1.2" fill="#fff"/>
    <circle cx="60"   cy="320" r="1"   fill="#fff"/>
    <circle cx="1540" cy="280" r="1.4" fill="#fff"/>
    <circle cx="320"  cy="780" r="1"   fill="#fff"/>
    <circle cx="900"  cy="820" r="1.2" fill="#fff"/>
    <circle cx="1480" cy="760" r="1"   fill="#fff"/>
  </g>

  <g transform="translate(220 220)">
    <polygon points="60,0 120,60 60,180 0,60" fill="url(#gemBlue)" stroke="#0a1a4a" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="180" stroke="#0a1a4a" stroke-width="1" opacity="0.4"/>
    <line x1="0"  y1="60" x2="120" y2="60" stroke="#0a1a4a" stroke-width="1" opacity="0.4"/>
    <polygon points="60,0 25,55 60,60" fill="#fff" opacity="0.35"/>
  </g>

  <g transform="translate(1280 180)">
    <polygon points="70,0 140,70 70,200 0,70" fill="url(#gemPink)" stroke="#3a0a20" stroke-width="2"/>
    <line x1="70" y1="0" x2="70" y2="200" stroke="#3a0a20" stroke-width="1" opacity="0.4"/>
    <line x1="0"  y1="70" x2="140" y2="70" stroke="#3a0a20" stroke-width="1" opacity="0.4"/>
    <polygon points="70,0 30,65 70,70" fill="#fff" opacity="0.4"/>
  </g>

  <g transform="translate(700 320)">
    <polygon points="100,0 200,100 100,280 0,100" fill="url(#gemPurple)" stroke="#1a0838" stroke-width="3"/>
    <line x1="100" y1="0"   x2="100" y2="280" stroke="#1a0838" stroke-width="1.5" opacity="0.5"/>
    <line x1="0"   y1="100" x2="200" y2="100" stroke="#1a0838" stroke-width="1.5" opacity="0.5"/>
    <polygon points="100,0 40,90 100,100" fill="#fff" opacity="0.45"/>
    <polygon points="100,0 160,90 100,100" fill="#fff" opacity="0.2"/>
  </g>

  <g transform="translate(440 560)">
    <polygon points="55,0 110,55 55,165 0,55" fill="url(#gemGreen)" stroke="#062818" stroke-width="2"/>
    <line x1="55" y1="0" x2="55" y2="165" stroke="#062818" stroke-width="1" opacity="0.4"/>
    <polygon points="55,0 22,50 55,55" fill="#fff" opacity="0.4"/>
  </g>

  <g transform="translate(1120 620)">
    <polygon points="65,0 130,65 65,195 0,65" fill="url(#gemYellow)" stroke="#3d2700" stroke-width="2"/>
    <line x1="65" y1="0" x2="65" y2="195" stroke="#3d2700" stroke-width="1" opacity="0.4"/>
    <line x1="0"  y1="65" x2="130" y2="65" stroke="#3d2700" stroke-width="1" opacity="0.4"/>
    <polygon points="65,0 26,60 65,65" fill="#fff" opacity="0.4"/>
  </g>
</svg>
